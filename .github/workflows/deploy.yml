name: Deploy PandaDoc Elite
on: [workflow_dispatch]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Generate Pages  # Runs orchestrator
      run: node orchestrator.js
    
    - name: Deploy to Pages  # Direct GitHub Pages (NO gh-pages needed)
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
